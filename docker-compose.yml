version: '3.8'

services:
  # Backend Flask Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-backend
    ports:
      - "5000:5000"
    environment:
      - ENVIRONMENT=production
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://root:password123@mysql:3306/devops_db
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
    networks:
      - devops-network
    restart: unless-stopped
    command: python app.py

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: devops-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=password123
      - MYSQL_DATABASE=devops_db
      - MYSQL_USER=devops_user
      - MYSQL_PASSWORD=devops_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - devops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  # Nginx Web Server (Frontend)
  nginx:
    image: nginx:alpine
    container_name: devops-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - devops-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  devops-network:
    driver: bridge
